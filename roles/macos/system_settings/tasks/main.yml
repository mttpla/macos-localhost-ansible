---
- name: add prompt to zshrc file
  blockinfile:
    path: ~/.zshrc
    block: 'PROMPT={{ prompt }}'
    marker: '# {mark} Prompt setting'
    create: yes
  when: prompt != None

- name: generate SSH key
  openssh_keypair:
    path: '{{item}}'
    type: ed25519
    state: present
    force: no
  loop: '{{ ssh_keys }}'

- name: remove legacy ssh-add blocks from zshrc
  blockinfile:
    path: ~/.zshrc
    marker: '# {mark} SSH KEY {{ item }}'
    state: absent
  loop: '{{ ssh_keys }}'

- name: configure ssh_config for keychain integration
  blockinfile:
    path: ~/.ssh/config
    block: |
      Host *
        IgnoreUnknown UseKeychain
        UseKeychain yes
        AddKeysToAgent yes
    marker: '# {mark} macOS Keychain'
    create: yes
    mode: '0600'

- name: add ssh keys to macOS Keychain
  command: /usr/bin/ssh-add --apple-use-keychain {{ item }}
  loop: '{{ ssh_keys }}'
  changed_when: false
  ignore_errors: true

- name: add nvm line to zshrc file
  blockinfile:
    path: ~/.zshrc
    block: '{{ nvm_lines }}'
    marker: '# {mark} NVM setting'
    create: yes
  when: nvm_lines != None

- name: add chruby to zshrc file
  blockinfile:
    path: ~/.zshrc
    block: '{{ chruby_lines }}'
    marker: '# {mark} chruby'
    create: yes
  when: chruby_lines != None

- name: add JAVA_HOME to zshrc file
  blockinfile:
    path: ~/.zshrc
    block: '{{ java_lines }}'
    marker: '# {mark} java'
    create: yes
  when: java_lines != None

- name: add COPILOT_CUSTOM_INSTRUCTIONS_DIRS
  blockinfile:
    path: ~/.zshrc
    block: '{{ copilot_custom_instructions_dirs_lines }}'
    marker: '# {mark} COPILOT_CUSTOM_INSTRUCTIONS_DIRS'
    create: yes
  when: copilot_custom_instructions_dirs_lines != None

- name: Set terminal profile
  shell: defaults write com.apple.Terminal 'Default Window Settings' {{terminal.profile}}

- import_tasks: hostname.yml
- import_tasks: finder.yml
- import_tasks: dock.yml
