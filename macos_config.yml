---
computername: mttPC-2023
hostname: mttPC-2023
user: paoli
prompt: "'%n@%m %/ %# '"
nvm_lines: |
  export NVM_DIR="$HOME/.nvm"
  _nvm_load() {
    [ -s "/opt/homebrew/opt/nvm/nvm.sh" ] && source "/opt/homebrew/opt/nvm/nvm.sh"
    [ -s "/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm" ] && source "/opt/homebrew/opt/nvm/etc/bash_completion.d/nvm"
  }
  nvm()  { unfunction nvm node npm npx; _nvm_load; nvm "$@"; }
  node() { unfunction nvm node npm npx; _nvm_load; node "$@"; }
  npm()  { unfunction nvm node npm npx; _nvm_load; npm "$@"; }
  npx()  { unfunction nvm node npm npx; _nvm_load; npx "$@"; }
ruby_version: "3.2.2"
chruby_lines: |
  source /opt/homebrew/opt/chruby/share/chruby/chruby.sh
  source /opt/homebrew/opt/chruby/share/chruby/auto.sh
  chruby ruby-{{ ruby_version }}
java_lines: |
  export JAVA_HOME=$(/usr/libexec/java_home -v 25)
copilot_custom_instructions_dirs_lines: |
  export COPILOT_CUSTOM_INSTRUCTIONS_DIRS="$HOME/.copilot/custom_instructions"

personal_data:
  &personal_data {
    key: "~/.ssh/mtt-id_ed25519",
    repo: git@github.com:mttpla,
    folder: ~/private,
  }

ssh_keys:
  - "{{ personal_data.key }}"
  - "~/.ssh/ws-github-id_ed25519"

dock:
  position: BOTTOM
  size: 40
  hotCorners:
    topLeft: 2
    topRight: 2
    bottomRight: 2
    bottomLeft: 2

  apps:
    - { name: Terminal, path: /System/Applications/Utilities/Terminal.app }
    - { name: "Google Chrome", path: "/Applications/Google Chrome.app" }
    - { name: Telegram, path: /Applications/Telegram.app }
    - { name: WhatsApp, path: /Applications/WhatsApp.app }

finder:
  showDriveOnDestktop: "true"
  showHiddenFiles: "true"
  showFilesExtentions: "true"
  showStatusBarInFinder: "true"
  showPathBarInFinder: "true"

terminal:
